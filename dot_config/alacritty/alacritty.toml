[general]
import = ["./tokyo-night-storm.toml"]

[window]
padding = { y = 30 }
decorations = "Buttonless"
opacity = 0.95
startup_mode = "Maximized"
option_as_alt = "Both"

[font]
normal = { family = "Hack Nerd Font", style = "Regular" }
bold   = { family = "Hack Nerd Font", style = "Bold" }
italic = { family = "Hack Nerd Font", style = "Italic" }
size = 14.0

