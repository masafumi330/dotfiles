unbind 'd' # デフォルトの detach を解除して分割に使う

bind r source-file $HOME/.config/tmux/tmux.conf \; display "Reloaded!"

bind N command-prompt -p "新規セッション名:" "new-session -s '%%'"
bind R command-prompt -I "#S" -p "セッション名変更:" "rename-session '%%'"

# ウィンドウ・ペイン番号を1始まりに
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# マウス操作を有効化
set -g mouse on

# 256色 + True Color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# コピーモードをvi風に
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# ESCの遅延をなくす (vim向け)
set -sg escape-time 0

# ======================================
# ペインボーダー
# ======================================

set -g pane-border-style        "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"

# ======================================
# ステータスバー（左側にウィンドウ一覧、右側にセッション一覧）
# ======================================

set -g status-position bottom
set -g status-interval 2
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# 左: 全ウィンドウ一覧（現在のウィンドウは強調表示）
set -g status-left-length 200
set -g status-left "#(~/.config/tmux/window-status.sh)"

# 右: 全セッション一覧（現在のセッションは強調表示）
set -g status-right-length 200
set -g status-right "#(~/.config/tmux/session-status.sh '#S')"

# Cmd+1-9 → Alacritty が prefix+1-9 を送信 → 番号でセッション移動
bind 1 run-shell "$HOME/.config/tmux/switch-session.sh 1"
bind 2 run-shell "$HOME/.config/tmux/switch-session.sh 2"
bind 3 run-shell "$HOME/.config/tmux/switch-session.sh 3"
bind 4 run-shell "$HOME/.config/tmux/switch-session.sh 4"
bind 5 run-shell "$HOME/.config/tmux/switch-session.sh 5"
bind 6 run-shell "$HOME/.config/tmux/switch-session.sh 6"
bind 7 run-shell "$HOME/.config/tmux/switch-session.sh 7"
bind 8 run-shell "$HOME/.config/tmux/switch-session.sh 8"
bind 9 run-shell "$HOME/.config/tmux/switch-session.sh 9"

# # prefix+m: 現在のペインを別セッションへインタラクティブに移動
# # ※ Ctrl+M は Enter(0x0D) と同一のためバインド不可
